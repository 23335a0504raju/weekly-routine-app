<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Routine Planner | Organize Your Schedule</title>
    <meta name="description" content="A beautiful, interactive weekly routine planner. Organize your tasks, schedule breaks, and manage your time efficiently.">
    <meta name="theme-color" content="#4f46e5">
    <meta property="og:title" content="Weekly Routine Planner">
    <meta property="og:description" content="A beautiful, interactive weekly routine planner.">
    <meta property="og:type" content="website">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header-container">
        <div class="title-wrapper" style="gap: 16px;">
            <div class="logo-box" style="background: white; padding: 8px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#primary-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#4f46e5" />
                            <stop offset="100%" stop-color="#ec4899" />
                        </linearGradient>
                    </defs>
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                    <path d="M8 14h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 18h.01"></path>
                    <path d="M12 18h.01"></path>
                    <path d="M16 18h.01"></path>
                </svg>
            </div>
            <div>
                <h1 style="margin: 0; background: -webkit-linear-gradient(45deg, #4f46e5, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Weekly Routine Planner</h1>
                <p style="margin: 4px 0 0 0; color: var(--text-muted); font-size: 0.95rem; font-weight: 500;">Organize your time, master your week</p>
            </div>
        </div>
        <div class="controls">
            <button class="btn-outline btn-icon-only" id="undoBtn" onclick="undo()" title="Undo (Ctrl+Z)" disabled>
                <i data-feather="corner-up-left" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="btn-outline btn-icon-only" id="redoBtn" onclick="redo()" title="Redo (Ctrl+Y)" disabled>
                <i data-feather="corner-up-right" style="width: 18px; height: 18px;"></i>
            </button>
            <div class="divider"></div>
            <button class="btn-outline btn-icon-only" id="importBtn" title="Import JSON Data">
                <i data-feather="upload" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="btn-outline btn-icon-only" id="exportBtn" title="Export as JSON">
                <i data-feather="download" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="btn-outline" id="shareBtn" title="Get Shareable Link">
                <i data-feather="link" style="width: 18px; height: 18px;"></i> Share
            </button>
            <div class="divider"></div>
            <button class="btn-outline btn-icon-only" id="clearBtn" title="Clear All Data">
                <i data-feather="trash-2" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="btn-outline btn-icon-only" id="printBtn" title="Print PDF">
                <i data-feather="printer" style="width: 18px; height: 18px;"></i>
            </button>
            <button class="btn-primary" id="saveBtn">
                <i data-feather="save" style="width: 18px; height: 18px;"></i> Save
            </button>
        </div>
    </div>

    <div class="toolbar-container">
        <button class="btn-secondary" id="addTaskRowBtn"><i data-feather="plus" style="width: 16px; height: 16px;"></i> Add Time Slot</button>
        <button class="btn-secondary" id="addBreakRowBtn"><i data-feather="coffee" style="width: 16px; height: 16px;"></i> Add Break</button>
    </div>

    <div class="table-container">
        <div class="table-scroll">
            <table id="routineTable">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th data-day="1" class="day-header">Monday <button class="col-copy-btn" onclick="openCopyDayModal(1, 'Monday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                        <th data-day="2" class="day-header">Tuesday <button class="col-copy-btn" onclick="openCopyDayModal(2, 'Tuesday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                        <th data-day="3" class="day-header">Wednesday <button class="col-copy-btn" onclick="openCopyDayModal(3, 'Wednesday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                        <th data-day="4" class="day-header">Thursday <button class="col-copy-btn" onclick="openCopyDayModal(4, 'Thursday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                        <th data-day="5" class="day-header">Friday <button class="col-copy-btn" onclick="openCopyDayModal(5, 'Friday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                        <th data-day="6" class="day-header">Saturday <button class="col-copy-btn" onclick="openCopyDayModal(6, 'Saturday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                        <th data-day="0" class="day-header">Sunday <button class="col-copy-btn" onclick="openCopyDayModal(0, 'Sunday')" title="Copy schedule"><i data-feather="copy"></i></button></th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Content injected via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <input type="file" id="fileInput" accept=".json" style="display: none;">

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-box">
            <div class="modal-icon"><i data-feather="alert-triangle" style="width: 48px; height: 48px;"></i></div>
            <div class="modal-title">Please Confirm</div>
            <div class="modal-message" id="confirmMessage">Are you sure you want to proceed?</div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="confirmCancelBtn">Cancel</button>
                <button class="modal-btn confirm" id="confirmOkBtn">Confirm</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="copyDayModal">
        <div class="modal-box">
            <div class="modal-icon"><i data-feather="copy" style="width: 48px; height: 48px; color: var(--primary);"></i></div>
            <div class="modal-title">Copy Schedule</div>
            <div class="modal-message">Where would you like to copy <strong id="copySourceDayName">Monday</strong>'s schedule?</div>
            
            <div style="margin-bottom: 24px; text-align: left;">
                <select id="copyTargetDaySelect" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); font-family: 'Inter', sans-serif; font-size: 0.95rem; background: #f9fafb; outline: none; cursor: pointer;">
                    <option value="all">Every Day (All week)</option>
                    <option value="1">Monday</option>
                    <option value="2">Tuesday</option>
                    <option value="3">Wednesday</option>
                    <option value="4">Thursday</option>
                    <option value="5">Friday</option>
                    <option value="6">Saturday</option>
                    <option value="0">Sunday</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" id="copyDayCancelBtn">Cancel</button>
                <button class="modal-btn confirm" id="copyDayOkBtn">Copy</button>
            </div>
        </div>
    </div>

    <footer style="text-align: center; margin-top: auto; padding-top: 2.5rem; padding-bottom: 1rem; color: #9ca3af; font-size: 0.85rem; font-weight: 500; width: 100%;">
        <p>Designed for Productivity &bull; Hosted on Vercel</p>
    </footer>

    <script>
        feather.replace();
        const STORAGE_KEY = 'timetableRoutineData';

        const defaultData = [
            { type: 'task', time: '06:00 AM - 08:00 AM', days: ['','','','','','',''] },
            { type: 'task', time: '08:00 AM - 10:00 AM', days: ['','','','','','',''] },
            { type: 'task', time: '10:00 AM - 12:00 PM', days: ['','','','','','',''] },
            { type: 'break', time: '12:00 PM - 01:00 PM', content: '🍱 Lunch / Break ☕' },
            { type: 'task', time: '01:00 PM - 03:00 PM', days: ['','','','','','',''] },
            { type: 'task', time: '03:00 PM - 06:00 PM', days: ['','','','','','',''] },
            { type: 'task', time: '06:00 PM - 09:00 PM', days: ['','','','','','',''] },
            { type: 'task', time: '09:00 PM - 10:30 PM', days: ['','','','','','',''] }
        ];

        // Core Functions
        function getTableData() {
            const rows = document.querySelectorAll('#routineTable tbody tr');
            const data = [];
            rows.forEach(row => {
                const type = row.classList.contains('break-row') ? 'break' : 'task';
                const timeEl = row.querySelector('.time-text');
                const timeText = timeEl ? timeEl.innerText.trim() : '';
                
                if (type === 'break') {
                    const contentCell = row.querySelector('td.task-cell');
                    data.push({ type: 'break', time: timeText, content: contentCell ? contentCell.innerText.trim() : '' });
                } else {
                    const dayCells = row.querySelectorAll('td.task-cell');
                    const days = Array.from(dayCells).map(cell => cell.innerText.trim());
                    data.push({ type: 'task', time: timeText, days });
                }
            });
            return data;
        }

        function renderTable(data) {
            const tbody = document.querySelector('#routineTable tbody');
            tbody.innerHTML = '';
            data.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                if (row.type === 'break') {
                    tr.className = 'break-row';
                    tr.innerHTML = `
                        <td class="time-col" style="position: relative;">
                            <div contenteditable="true" class="time-text">${row.time}</div>
                            <div class="row-actions" contenteditable="false">
                                <button class="action-btn" onclick="insertRow(this, 'task')" title="Insert Task Below"><i data-feather="plus"></i></button>
                                <button class="action-btn" onclick="insertRow(this, 'break')" title="Insert Break Below"><i data-feather="coffee"></i></button>
                                <button class="action-btn delete-btn" onclick="deleteRow(this)" title="Delete Row"><i data-feather="trash-2"></i></button>
                            </div>
                        </td>
                        <td colspan="7" contenteditable="true" class="task-cell break-content">${row.content || ''}</td>
                    `;
                } else {
                    tr.innerHTML = `
                        <td class="time-col" style="position: relative;">
                            <div contenteditable="true" class="time-text">${row.time}</div>
                            <div class="row-actions" contenteditable="false">
                                <button class="action-btn" onclick="copyRowAcross(this)" title="Copy first task to all days"><i data-feather="copy"></i></button>
                                <button class="action-btn" onclick="insertRow(this, 'task')" title="Insert Task Below"><i data-feather="plus"></i></button>
                                <button class="action-btn" onclick="insertRow(this, 'break')" title="Insert Break Below"><i data-feather="coffee"></i></button>
                                <button class="action-btn delete-btn" onclick="deleteRow(this)" title="Delete Row"><i data-feather="trash-2"></i></button>
                            </div>
                        </td>
                        <td contenteditable="true" class="task-cell" data-col="1" data-label="Monday">${row.days[0] || ''}</td>
                        <td contenteditable="true" class="task-cell" data-col="2" data-label="Tuesday">${row.days[1] || ''}</td>
                        <td contenteditable="true" class="task-cell" data-col="3" data-label="Wednesday">${row.days[2] || ''}</td>
                        <td contenteditable="true" class="task-cell" data-col="4" data-label="Thursday">${row.days[3] || ''}</td>
                        <td contenteditable="true" class="task-cell" data-col="5" data-label="Friday">${row.days[4] || ''}</td>
                        <td contenteditable="true" class="task-cell" data-col="6" data-label="Saturday">${row.days[5] || ''}</td>
                        <td contenteditable="true" class="task-cell" data-col="0" data-label="Sunday">${row.days[6] || ''}</td>
                    `;
                }
                tbody.appendChild(tr);
            });
            feather.replace();
            highlightToday();
            updateColumnCopyButtons();
        }

        function highlightToday() {
            document.querySelectorAll('.today').forEach(el => el.classList.remove('today'));
            const today = new Date().getDay();
            document.querySelectorAll(`th[data-day="${today}"]`).forEach(th => th.classList.add('today'));
            document.querySelectorAll(`td[data-col="${today}"]`).forEach(td => td.classList.add('today'));
        }

        function updateColumnCopyButtons() {
            const tbody = document.querySelector('#routineTable tbody');
            for (let day = 0; day <= 6; day++) {
                const cells = tbody.querySelectorAll(`td[data-col="${day}"]`);
                let allFilled = cells.length > 0;
                
                cells.forEach(cell => {
                    const content = cell.innerHTML.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, '').trim();
                    if (content === '') {
                        allFilled = false;
                    }
                });
                
                const header = document.querySelector(`th[data-day="${day}"]`);
                if (header) {
                    const btn = header.querySelector('.col-copy-btn');
                    if (btn) {
                        btn.style.display = allFilled ? 'flex' : 'none';
                    }
                }
            }
        }

        let historyStack = [];
        let historyIndex = -1;

        function updateUndoRedoButtons() {
            const undoBtn = document.getElementById('undoBtn');
            const redoBtn = document.getElementById('redoBtn');
            if (undoBtn) undoBtn.disabled = historyIndex <= 0;
            if (redoBtn) redoBtn.disabled = historyIndex >= historyStack.length - 1;
            feather.replace(); // re-init icons if needed
        }

        function saveData(silent = false, skipHistory = false) {
            const data = getTableData();
            const jsonStr = JSON.stringify(data);
            localStorage.setItem(STORAGE_KEY, jsonStr);
            if(!silent) showToast('✓ Schedule saved successfully', 'success');

            if (!skipHistory) {
                if (historyIndex < historyStack.length - 1) {
                    historyStack = historyStack.slice(0, historyIndex + 1);
                }
                if (historyIndex === -1 || historyStack[historyIndex] !== jsonStr) {
                    historyStack.push(jsonStr);
                    historyIndex++;
                    if (historyStack.length > 50) {
                        historyStack.shift();
                        historyIndex--;
                    }
                }
                updateUndoRedoButtons();
            }
        }

        window.undo = function() {
            if (historyIndex > 0) {
                historyIndex--;
                const data = JSON.parse(historyStack[historyIndex]);
                renderTable(data);
                localStorage.setItem(STORAGE_KEY, historyStack[historyIndex]);
                updateUndoRedoButtons();
                showToast('↶ Undo successful', 'info');
            }
        };

        window.redo = function() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                const data = JSON.parse(historyStack[historyIndex]);
                renderTable(data);
                localStorage.setItem(STORAGE_KEY, historyStack[historyIndex]);
                updateUndoRedoButtons();
                showToast('↷ Redo successful', 'info');
            }
        };

        // Custom UI Modal Logic
        let confirmCallback = null;
        function showConfirmModal(message, callback) {
            document.getElementById('confirmMessage').textContent = message;
            confirmCallback = callback;
            document.getElementById('confirmModal').classList.add('active');
        }

        function hideConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        }

        document.getElementById('confirmCancelBtn').addEventListener('click', hideConfirmModal);
        document.getElementById('confirmOkBtn').addEventListener('click', () => {
            if (confirmCallback) confirmCallback();
            hideConfirmModal();
        });

        window.deleteRow = function(btn) {
            showConfirmModal('Are you sure you want to delete this row?', () => {
                btn.closest('tr').remove();
                saveData(true);
            });
        };

        window.insertRow = function(btn, type) {
            const tr = btn.closest('tr');
            const tbody = tr.parentElement;
            const rows = Array.from(tbody.children);
            const index = rows.indexOf(tr);
            
            const data = getTableData();
            const newRow = type === 'break' 
                ? { type: 'break', time: 'New Break', content: 'Break Time' }
                : { type: 'task', time: 'New Time', days: ['','','','','','',''] };
                
            data.splice(index + 1, 0, newRow);
            renderTable(data);
            saveData(true);
        };

        let activeCopySourceIndex = -1;

        window.openCopyDayModal = function(sourceColIndex, dayName) {
            activeCopySourceIndex = sourceColIndex;
            document.getElementById('copySourceDayName').textContent = dayName;
            
            const select = document.getElementById('copyTargetDaySelect');
            Array.from(select.options).forEach(opt => {
                if (opt.value === 'all') {
                    opt.disabled = false; opt.hidden = false;
                } else if (parseInt(opt.value) === sourceColIndex) {
                    opt.disabled = true; opt.hidden = true;
                } else {
                    opt.disabled = false; opt.hidden = false;
                }
            });
            select.value = 'all';
            
            document.getElementById('copyDayModal').classList.add('active');
        };

        function hideCopyDayModal() {
            document.getElementById('copyDayModal').classList.remove('active');
            activeCopySourceIndex = -1;
        }

        document.getElementById('copyDayCancelBtn').addEventListener('click', hideCopyDayModal);
        
        document.getElementById('copyDayOkBtn').addEventListener('click', () => {
            if (activeCopySourceIndex === -1) return;
            const targetVal = document.getElementById('copyTargetDaySelect').value;
            
            const data = getTableData();
            let sourceIdx = activeCopySourceIndex === 0 ? 6 : activeCopySourceIndex - 1;
            
            data.forEach(row => {
                if (row.type === 'task') {
                    const sourceContent = row.days[sourceIdx];
                    if (targetVal === 'all') {
                        for(let i = 0; i < 7; i++) {
                            row.days[i] = sourceContent;
                        }
                    } else {
                        let targetIdx = parseInt(targetVal) === 0 ? 6 : parseInt(targetVal) - 1;
                        row.days[targetIdx] = sourceContent;
                    }
                }
            });
            renderTable(data);
            saveData(true);
            showToast(targetVal === 'all' ? 'Copied to all days!' : 'Day copied successfully!', 'success');
            hideCopyDayModal();
        });

        window.copyRowAcross = function(btn) {
            const tr = btn.closest('tr');
            const taskCells = tr.querySelectorAll('td.task-cell');
            if(taskCells.length === 0) return;
            
            let sourceContent = taskCells[0].innerHTML;
            for(let i=0; i<taskCells.length; i++) {
                if(taskCells[i].innerHTML.trim() !== '' && taskCells[i].innerHTML.indexOf('Click to add...') === -1) {
                    sourceContent = taskCells[i].innerHTML;
                    break;
                }
            }
            
            taskCells.forEach(cell => cell.innerHTML = sourceContent);
            saveData(true);
            showToast('Task copied across all days!', 'success');
        };

        // Toast
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = message;
            container.appendChild(toast);
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // Init App
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedData = urlParams.get('data');

            if (sharedData) {
                try {
                    // Decode base64 URL safe
                    const jsonStr = decodeURIComponent(escape(atob(sharedData)));
                    const data = JSON.parse(jsonStr);
                    renderTable(data);
                    saveData(true); // Persist shared data locally
                    showToast('🔗 Shared schedule loaded!', 'success');
                    // Clean URL
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.delete('data');
                    window.history.replaceState({}, '', newUrl);
                } catch (e) {
                    showToast('Invalid link. Loading local data.', 'error');
                    loadLocalData();
                }
            } else {
                loadLocalData();
            }

            function loadLocalData() {
                const saved = localStorage.getItem(STORAGE_KEY);
                let initialData = defaultData;
                if (saved) {
                    try { initialData = JSON.parse(saved); } catch (e) {}
                }
                renderTable(initialData);
                historyStack = [JSON.stringify(initialData)];
                historyIndex = 0;
                updateUndoRedoButtons();
            }

            document.addEventListener('keydown', (e) => {
                if (e.ctrlKey || e.metaKey) {
                    const key = e.key.toLowerCase();
                    if (key === 'z') {
                        e.preventDefault();
                        if (e.shiftKey) window.redo();
                        else window.undo();
                    } else if (key === 'y') {
                        e.preventDefault();
                        window.redo();
                    }
                }
            });

            // Event Delegation for Content Editable
            let timeout;
            const tbody = document.querySelector('#routineTable tbody');
            
            tbody.addEventListener('input', (e) => {
                if (e.target.hasAttribute('contenteditable')) {
                    if (e.target.innerHTML === '<br>' || e.target.innerHTML === '<div><br></div>') {
                        e.target.innerHTML = '';
                    }
                    clearTimeout(timeout);
                    timeout = setTimeout(() => saveData(true), 1500);
                    updateColumnCopyButtons();
                }
            });

            tbody.addEventListener('keydown', (e) => {
                if (e.target.hasAttribute('contenteditable') && e.key === 'Enter') {
                    e.preventDefault();
                    document.execCommand('insertLineBreak');
                }
            });

            // Button Listeners
            document.getElementById('saveBtn').addEventListener('click', () => saveData(false));
            
            document.getElementById('clearBtn').addEventListener('click', () => {
                showConfirmModal('Clear all tasks? This cannot be undone.', () => {
                    renderTable(defaultData.map(row => ({
                        ...row, 
                        days: row.days ? ['','','','','','',''] : undefined,
                        content: row.type === 'break' ? '🍱 Lunch / Break ☕' : undefined
                    })));
                    localStorage.removeItem(STORAGE_KEY);
                    showToast('🗑️ All tasks cleared', 'success');
                });
            });

            document.getElementById('printBtn').addEventListener('click', () => window.print());

            document.getElementById('addTaskRowBtn').addEventListener('click', () => {
                const data = getTableData();
                data.push({ type: 'task', time: 'New Time', days: ['','','','','','',''] });
                renderTable(data);
                saveData(true);
            });

            document.getElementById('addBreakRowBtn').addEventListener('click', () => {
                const data = getTableData();
                data.push({ type: 'break', time: 'New Break', content: 'Break Time' });
                renderTable(data);
                saveData(true);
            });

            // Export Data
            document.getElementById('exportBtn').addEventListener('click', () => {
                const data = getTableData();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `timetable_export_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                showToast('Data exported successfully', 'success');
            });

            // Import Data
            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });

            document.getElementById('fileInput').addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = JSON.parse(event.target.result);
                            if (Array.isArray(data)) {
                                renderTable(data);
                                saveData(true);
                                showToast('Data imported successfully', 'success');
                            } else {
                                throw new Error('Invalid format');
                            }
                        } catch(err) {
                            showToast('Failed to import: Invalid file format', 'error');
                        }
                    };
                    reader.readAsText(e.target.files[0]);
                }
                // Reset input so the same file can be selected again
                e.target.value = '';
            });

            // Share Link
            document.getElementById('shareBtn').addEventListener('click', () => {
                const data = getTableData();
                const jsonStr = JSON.stringify(data);
                try {
                    const base64 = btoa(unescape(encodeURIComponent(jsonStr)));
                    const url = new URL(window.location.href);
                    url.searchParams.set('data', base64);
                    
                    navigator.clipboard.writeText(url.toString()).then(() => {
                        showToast('🔗 Shareable link copied to clipboard!', 'success');
                    }).catch(() => {
                        showToast('Failed to copy link automatically', 'error');
                    });
                } catch (e) {
                    showToast('Failed to generate link', 'error');
                }
            });
        });
    </script>
</body>
</html>
